{
  "version":1,
  "disable_existing_loggers": true,
  "formatters": {
        "simple": {
            "datefmt": "%H:%M:%S",
            "format": "%(asctime)s:%(levelname)-8s - %(message)s"
        },
        "standard": {
            "datefmt": "%H:%M:%S",
            "format": "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
        }
  },
  "handlers": {
          "console": {
            "class": "logging.StreamHandler",
            "formatter": "standard",
            "level": "INFO"
        },
        "baselogs": {
            "class": "logging.handlers.RotatingFileHandler",
            "filename": "tetrarc.log",
            "mode": "a",
            "maxBytes": 104857600,
            "backupCount": 5,
            "formatter": "standard",
            "level": "INFO"
        },
        "userlogs": {
            "class": "logging.handlers.RotatingFileHandler",
            "filename": "user.log",
            "mode": "a",
            "maxBytes": 104857600,
            "backupCount": 5,
            "formatter": "standard",
            "level": "INFO"
        },
        "adminlogs": {
            "class": "logging.handlers.RotatingFileHandler",
            "filename": "admin.log",
            "mode": "a",
            "maxBytes": 104857600,
            "backupCount": 5,
            "formatter": "standard",
            "level": "INFO"
        }
  },
  "loggers": {
          "": {
            "handlers": ["console", "baselogs"],
            "level": "INFO"
          },
          "userlogs": {
            "handlers": ["userlogs"],
            "propagate": false,
            "level": "INFO"
          },
          "adminlogs": {
            "handlers": ["adminlogs"],
            "propagate": false,
            "level": "INFO"
          }
  }
}
